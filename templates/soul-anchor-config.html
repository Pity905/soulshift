<form>
  <div style="display:flex;flex-direction:column;gap:12px;padding:8px;font-family:Georgia,serif;">

    <div class="form-group">
      <label>Item Name</label>
      <input type="text" name="itemName" value="{{itemName}}" placeholder="Soul Anchor">
      <p class="hint">The item will be renamed to this when saved.</p>
    </div>

    <div class="form-group">
      <label>Master Name Prefix</label>
      <input type="text" name="masterPrefix" value="{{masterPrefix}}" placeholder="M.">
      <p class="hint">Prepended to personality name on shift. E.g. "M." → "M. Torvi Yarrow"</p>
    </div>

    <hr>

    <div>
      <label style="font-weight:bold;">Linked Personalities</label>
      <div id="ss-personality-list" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
        {{#each personalities}}
        <div class="ss-personality-entry" style="
          display:flex;align-items:center;gap:10px;padding:6px 8px;
          background:#1a1a2e;border:1px solid #7a4aaa;border-radius:6px;
        ">
          <img src="{{this.img}}" width="32" height="32" style="border-radius:50%;border:1px solid #7a4aaa;object-fit:cover"/>
          <span style="flex:1;color:#f0e6d3;">{{this.name}}</span>
          <input type="hidden" name="personalityIds" value="{{this.id}}">
          <button type="button" class="ss-remove-personality" data-id="{{this.id}}" style="
            background:#3a1a1a;border:1px solid #8b2a2a;color:#f0e6d3;
            border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.8em;
          ">✕ Remove</button>
        </div>
        {{/each}}
        {{#unless personalities.length}}
        <p id="ss-no-personalities" style="color:#888;font-size:0.85em;font-style:italic;">
          No personalities linked yet.
        </p>
        {{/unless}}
      </div>
    </div>

    <div class="form-group">
      <label>Add Personality</label>
      <div style="display:flex;gap:8px;">
        <select id="ss-actor-select" style="flex:1;padding:4px;">
          <option value="">— Select an actor —</option>
          {{#each allActors}}
          <option value="{{this.id}}">{{this.name}}</option>
          {{/each}}
        </select>
        <button type="button" id="ss-add-personality" style="
          background:#1a2a3e;border:1px solid #4a8aaa;color:#f0e6d3;
          border-radius:4px;padding:4px 12px;cursor:pointer;
        ">+ Add</button>
      </div>
    </div>

  </div>
</form>
